name: Pipeline de Seguridad DevSecOps

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sast:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 10
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
      - name: Instalar Semgrep
        run: pip install semgrep
      - name: Ejecutar análisis SAST
        run: >-
          semgrep --config p/python --config p/owasp-top-ten
          --config p/secrets --config p/sql-injection
          Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/app/
          --error

  sca:
    name: SCA - pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar y ejecutar pip-audit
        run: |
          pip install pip-audit
          pip-audit -r Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/app/requirements.txt

  tests:
    name: Tests - pytest
    runs-on: ubuntu-latest
    needs: [ sast, sca ]
    timeout-minutes: 10
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: |
          pip install -r Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/app/requirements.txt
          pip install pytest
      - name: Ejecutar tests
        run: |
          pytest Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/tests/ -v
